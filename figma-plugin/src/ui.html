<main><p class="eyebrow">AGENTIC DESIGN SYSTEM</p><h1>Export selected component</h1><p>Translate the selected Figma node into a typed, token-aware React component and accessibility report.</p><input id="url" value="http://localhost:3000/api/design-system/translate" aria-label="Translation endpoint" /><button id="export">EXPORT TO CODE</button><pre id="result" aria-live="polite">Select a component, then export.</pre></main><style>body{margin:0;background:#08080a;color:#e8e8ec;font:12px Arial,sans-serif}main{padding:20px}.eyebrow{color:#6d4aff;font:10px monospace;letter-spacing:.1em}h1{font-size:23px;letter-spacing:-.06em}p{line-height:1.5;color:#a4a2a8}input,button{width:100%;box-sizing:border-box;padding:10px;margin-top:10px;border:1px solid #34343a;background:#141416;color:#e8e8ec}button{border-color:#6d4aff;background:#6d4aff;font:600 11px monospace;cursor:pointer}pre{margin-top:17px;padding:10px;white-space:pre-wrap;background:#141416;color:#a4a2a8;font:10px/1.45 monospace}</style><script>const send=(pluginMessage)=>parent.postMessage({pluginMessage},'*');document.querySelector('#export').onclick=()=>send({type:'export-component',url:document.querySelector('#url').value});onmessage=(event)=>{const d=event.data.pluginMessage;if(!d)return;document.querySelector('#result').textContent=d.type==='translated'?d.payload.component.source:(d.message||'Unknown response')};</script>
